name: FindMyPath Agents - Build & Test

on:
  push:
    branches: [main, gsd]
    paths:
      - "findmypath-agents/**"
      - ".github/workflows/findmypath-agents.yml"
  pull_request:
    branches: [main, gsd]
    paths:
      - "findmypath-agents/**"
      - ".github/workflows/findmypath-agents.yml"

env:
  PYTHON_VERSION: "3.11"
  WORKING_DIRECTORY: ./findmypath-agents

jobs:
  # ── Lint & Static Analysis ────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: findmypath-agents/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics \
            --extend-ignore=E501

      - name: Check formatting with black
        run: |
          black --check src/ tests/ || true

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    env:
      OPENAI_API_KEY: sk-fake-key-for-ci-testing
      OPENAI_MODEL: gpt-4-turbo-preview
      GO_BACKEND_URL: http://localhost:8080
      MAX_STEPS: 10
      PDF_OUTPUT_DIR: ./output/pdfs
      TEMPLATE_DIR: ./src/templates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: findmypath-agents/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p output/pdfs

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -x \
            -W ignore::DeprecationWarning \
            -W ignore::pytest.PytestReturnNotNoneWarning

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ env.WORKING_DIRECTORY }}/coverage.xml
          retention-days: 7

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          file: ${{ env.WORKING_DIRECTORY }}/Dockerfile
          push: false
          load: true
          tags: findmypath-agents:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image built
        run: docker images findmypath-agents

      - name: Smoke test — container starts
        run: |
          docker run --rm -d \
            --name agents-smoke-test \
            -e OPENAI_API_KEY=sk-fake-key \
            -e GO_BACKEND_URL=http://localhost:8080 \
            -p 18000:18000 \
            findmypath-agents:ci \
            uvicorn src.main:app --host 0.0.0.0 --port 18000

          echo "Waiting for service to start..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:18000/health > /dev/null 2>&1; then
              echo "✅ Health check passed"
              docker stop agents-smoke-test
              exit 0
            fi
            sleep 2
          done

          echo "❌ Health check failed after 30s"
          docker logs agents-smoke-test
          docker stop agents-smoke-test || true
          exit 1
