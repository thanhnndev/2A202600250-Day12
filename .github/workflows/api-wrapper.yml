name: API Wrapper - CI/CD

on:
  push:
    branches: [main, gsd]
    paths:
      - "api-wrapper/**"
      - ".github/workflows/api-wrapper.yml"
  pull_request:
    branches: [main, gsd]
    paths:
      - "api-wrapper/**"
      - ".github/workflows/api-wrapper.yml"

env:
  WORKING_DIRECTORY: ./api-wrapper
  IMAGE_NAME: api-wrapper
  MAX_IMAGE_SIZE_MB: 500

jobs:
  # ── Lint & Static Analysis ────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: api-wrapper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics \
            --extend-ignore=E501

      - name: Check formatting with black
        run: |
          black --check app/ || true

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    env:
      AGENT_API_KEY: sk-mock-key-for-ci-testing
      BACKEND_URL: http://localhost:18000
      REDIS_URL: redis://localhost:6379/0
      RATE_LIMIT_REQUESTS: 10
      RATE_LIMIT_WINDOW: 60
      COST_LIMIT_USD: 10.0
      COST_PER_REQUEST: 0.05
      PORT: 18001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: api-wrapper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Start Redis for tests
        uses: supercharge/redis-github-action@1.8.0
        with:
          redis-version: 7

      - name: Run tests with coverage
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short \
              --cov=app \
              --cov-report=xml \
              --cov-report=term-missing \
              -x \
              -W ignore::DeprecationWarning
          else
            echo "⚠️ No tests directory found — running import smoke test"
            python -c "from app.main import app; print('✅ App imports successfully')"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-wrapper-coverage-py${{ matrix.python-version }}
          path: ${{ env.WORKING_DIRECTORY }}/coverage.xml
          retention-days: 7

  # ── Security Scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: ${{ env.WORKING_DIRECTORY }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          file: ${{ env.WORKING_DIRECTORY }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check Docker image size
        id: image-size
        run: |
          IMAGE_SIZE=$(docker image inspect ${{ env.IMAGE_NAME }}:ci \
            --format='{{.Size}}')
          IMAGE_SIZE_MB=$((IMAGE_SIZE / 1024 / 1024))
          echo "size_mb=${IMAGE_SIZE_MB}" >> "$GITHUB_OUTPUT"
          echo "Image size: ${IMAGE_SIZE_MB} MB"

          if [ "$IMAGE_SIZE_MB" -gt "${{ env.MAX_IMAGE_SIZE_MB }}" ]; then
            echo "❌ Image size ${IMAGE_SIZE_MB}MB exceeds limit of ${{ env.MAX_IMAGE_SIZE_MB }}MB"
            exit 1
          fi
          echo "✅ Image size ${IMAGE_SIZE_MB}MB is within limit"

      - name: Generate Docker size report
        run: |
          echo "# Docker Image Size Report" > docker-size-report.md
          echo "" >> docker-size-report.md
          echo "| Metric | Value |" >> docker-size-report.md
          echo "|--------|-------|" >> docker-size-report.md
          echo "| Image | \`${{ env.IMAGE_NAME }}:ci\` |" >> docker-size-report.md
          echo "| Size | ${{ steps.image-size.outputs.size_mb }} MB |" >> docker-size-report.md
          echo "| Limit | ${{ env.MAX_IMAGE_SIZE_MB }} MB |" >> docker-size-report.md
          echo "| Status | ✅ Pass |" >> docker-size-report.md
          echo "" >> docker-size-report.md
          echo "## Layers" >> docker-size-report.md
          echo "" >> docker-size-report.md
          echo '```' >> docker-size-report.md
          docker history ${{ env.IMAGE_NAME }}:ci >> docker-size-report.md
          echo '```' >> docker-size-report.md

      - name: Upload Docker size report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-wrapper-docker-size-report
          path: docker-size-report.md
          retention-days: 30

      - name: Smoke test — container starts
        run: |
          docker run --rm -d \
            --name wrapper-smoke-test \
            -e AGENT_API_KEY=sk-mock-key \
            -e BACKEND_URL=http://localhost:18000 \
            -e REDIS_URL=redis://host.docker.internal:6379/0 \
            -p 18001:18001 \
            ${{ env.IMAGE_NAME }}:ci

          echo "Waiting for service to start..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:18001/health > /dev/null 2>&1; then
              echo "✅ Health check passed"
              docker stop wrapper-smoke-test
              exit 0
            fi
            sleep 2
          done

          echo "❌ Health check failed after 30s"
          docker logs wrapper-smoke-test
          docker stop wrapper-smoke-test || true
          exit 1

  # ── Security Scan (Docker Image) ───────────────────────────────────────────
  docker-security-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scan
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          file: ${{ env.WORKING_DIRECTORY }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: "sarif"
          output: "trivy-image-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-image-results.sarif"

  # ── Deploy to VPS (main branch only) ──────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker-build, docker-security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} << 'EOF'
            set -e
            echo "🚀 Deploying API Wrapper..."

            # Navigate to project directory
            cd ~/api-wrapper || { echo "Directory not found"; exit 1; }

            # Pull latest changes
            git pull origin main

            # Rebuild and restart containers
            docker compose up -d --build

            # Show running containers
            docker compose ps

            # Health check
            echo "Waiting for service to become healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:18001/health > /dev/null 2>&1; then
                echo "✅ Deployment successful — health check passed"
                exit 0
              fi
              sleep 2
            done

            echo "⚠️ Health check timed out — checking logs..."
            docker compose logs --tail=50
            exit 1
          EOF

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment ${{ job.status }} for commit ${{ github.sha }}"
